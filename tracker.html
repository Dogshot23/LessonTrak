<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Live Lesson Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:      #F7F4EF;
      --paper:      #FFFFFF;
      --ink:        #1A1714;
      --ink-soft:   #6B6560;
      --ink-faint:  #C5C0BA;
      --coral:      #E8553E;
      --coral-bg:   rgba(232,85,62,.08);
      --coral-border: rgba(232,85,62,.18);
      --coral-press: rgba(232,85,62,.18);
      --sage:       #3D8C6A;
      --sage-bg:    rgba(61,140,106,.08);
      --sage-border: rgba(61,140,106,.18);
      --sage-press:  rgba(61,140,106,.18);
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      overflow: hidden;
    }

    /* ─── LAYOUT ─── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh; /* dynamic viewport height */
      height: 100vh;  /* fallback */
      max-width: 540px;
      margin: 0 auto;
      padding: env(safe-area-inset-top, 0px) 0 env(safe-area-inset-bottom, 0px);
    }

    /* ─── HEADER ─── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .9rem 1.25rem .7rem;
      border-bottom: 1px solid rgba(26,23,20,.07);
      background: var(--cream);
      flex-shrink: 0;
    }
    .header-left a {
      font-family: 'Lora', serif;
      font-weight: 700;
      font-size: .95rem;
      color: var(--ink);
      text-decoration: none;
      opacity: .6;
      transition: opacity .2s;
    }
    .header-left a:hover { opacity: 1; }
    .live-pill {
      display: flex;
      align-items: center;
      gap: .4rem;
      background: rgba(232,85,62,.1);
      color: var(--coral);
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .07em;
      text-transform: uppercase;
      padding: .3rem .75rem;
      border-radius: 100px;
    }
    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--coral);
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: .4; transform: scale(.85); }
    }
    .reset-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--ink-faint);
      font-size: .8rem;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      padding: .3rem .5rem;
      border-radius: 8px;
      transition: color .2s, background .2s;
    }
    .reset-btn:hover { color: var(--coral); background: rgba(232,85,62,.08); }

    /* ─── MAIN SCROLL ─── */
    main {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 1rem 1.1rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    /* ─── SECTION BLOCKS ─── */
    .section-label {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: .65rem;
    }
    .section-label.err { color: var(--coral); }
    .section-label.pos { color: var(--sage); }
    .section-label-line {
      flex: 1;
      height: 1px;
      background: currentColor;
      opacity: .2;
    }

    /* ─── BUTTON GRID ─── */
    .btn-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .6rem;
    }

    /* ─── TRACKER BUTTON ─── */
    .track-btn {
      position: relative;
      border: none;
      border-radius: 14px;
      padding: .9rem .85rem;
      cursor: pointer;
      text-align: left;
      font-family: 'DM Sans', sans-serif;
      transition: transform .1s, box-shadow .15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      display: flex;
      flex-direction: column;
      gap: .5rem;
      overflow: hidden;
    }
    .track-btn:active { transform: scale(.96); }

    .track-btn.err {
      background: var(--paper);
      border: 1.5px solid var(--coral-border);
    }
    .track-btn.pos {
      background: var(--paper);
      border: 1.5px solid var(--sage-border);
    }

    .track-btn.err:hover  { background: rgba(232,85,62,.04); }
    .track-btn.pos:hover  { background: rgba(61,140,106,.04); }

    /* Flash animation on tap */
    .track-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }
    .track-btn.err::after { background: rgba(232,85,62,.15); }
    .track-btn.pos::after { background: rgba(61,140,106,.15); }
    .track-btn.flash::after { opacity: 1; }

    .btn-label {
      font-size: .82rem;
      font-weight: 600;
      line-height: 1.3;
      color: var(--ink);
    }
    .btn-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .btn-count {
      font-size: 1.55rem;
      font-weight: 700;
      line-height: 1;
      font-family: 'Lora', serif;
      transition: transform .15s;
    }
    .track-btn.err .btn-count { color: var(--coral); }
    .track-btn.pos .btn-count { color: var(--sage); }

    .btn-count.bump {
      animation: bump .22s ease-out;
    }
    @keyframes bump {
      0%   { transform: scale(1); }
      45%  { transform: scale(1.35); }
      100% { transform: scale(1); }
    }

    .btn-icon {
      width: 26px; height: 26px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .9rem;
    }
    .track-btn.err .btn-icon { background: var(--coral-bg); }
    .track-btn.pos .btn-icon { background: var(--sage-bg); }

    /* ─── TOTALS BAR ─── */
    .totals-bar {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      background: var(--paper);
      border-radius: 14px;
      padding: .85rem 1rem;
      border: 1px solid rgba(26,23,20,.06);
      gap: .5rem;
      flex-shrink: 0;
    }
    .total-item { text-align: center; }
    .total-val {
      font-family: 'Lora', serif;
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1;
    }
    .total-item:first-child .total-val { color: var(--coral); }
    .total-item:last-child  .total-val { color: var(--sage); }
    .total-lbl {
      font-size: .65rem;
      font-weight: 600;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-top: .25rem;
    }
    .total-divider { width: 1px; height: 32px; background: rgba(26,23,20,.08); margin: 0 auto; }

    /* ─── END LESSON BUTTON ─── */
    .end-section {
      padding: .6rem 1.1rem calc(.8rem + env(safe-area-inset-bottom, 0px));
      flex-shrink: 0;
      border-top: 1px solid rgba(26,23,20,.07);
      background: var(--cream);
    }
    .end-btn {
      width: 100%;
      padding: 1rem;
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s, transform .12s;
      -webkit-tap-highlight-color: transparent;
      letter-spacing: -.01em;
    }
    .end-btn:hover   { background: #2e2a26; }
    .end-btn:active  { transform: scale(.98); }

    /* ─── CONFIRM OVERLAY ─── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(26,23,20,.5);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: flex-end;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }
    .overlay.show { opacity: 1; pointer-events: all; }
    .sheet {
      background: var(--paper);
      width: 100%;
      max-width: 540px;
      margin: 0 auto;
      border-radius: 20px 20px 0 0;
      padding: 1.5rem 1.25rem calc(1.5rem + env(safe-area-inset-bottom, 0px));
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.22,1,.36,1);
    }
    .overlay.show .sheet { transform: translateY(0); }

    .sheet-handle {
      width: 36px; height: 4px;
      background: var(--ink-faint);
      border-radius: 2px;
      margin: 0 auto 1.5rem;
    }
    .sheet h3 {
      font-family: 'Lora', serif;
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: .4rem;
    }
    .sheet p { font-size: .88rem; color: var(--ink-soft); margin-bottom: 1.5rem; }
    .sheet-actions { display: flex; gap: .65rem; }
    .sheet-cancel, .sheet-confirm {
      flex: 1;
      padding: .9rem;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background .2s, transform .12s;
    }
    .sheet-cancel  { background: var(--cream); color: var(--ink); }
    .sheet-confirm { background: var(--coral); color: #fff; }
    .sheet-cancel:hover  { background: #ede9e3; }
    .sheet-confirm:hover { background: #d44232; }
    .sheet-confirm:active, .sheet-cancel:active { transform: scale(.97); }
  </style>
</head>
<body>

<div class="app">

  <header>
    <div class="header-left">
      <a href="index.html">← LessonTracker</a>
    </div>
    <div class="live-pill"><span class="live-dot"></span> Live</div>
    <button class="reset-btn" onclick="confirmReset()">Reset</button>
  </header>

  <!-- TOTALS -->
  <main id="main-scroll">
    <div class="totals-bar">
      <div class="total-item">
        <div class="total-val" id="total-errors">0</div>
        <div class="total-lbl">Errors</div>
      </div>
      <div class="total-divider"></div>
      <div class="total-item">
        <div class="total-val" id="total-positives">0</div>
        <div class="total-lbl">Positives</div>
      </div>
    </div>

    <!-- ERRORS -->
    <div>
      <div class="section-label err">
        Errors
        <div class="section-label-line"></div>
      </div>
      <div class="btn-grid">
        <button class="track-btn err" onclick="tap('errors','article',this)">
          <div class="btn-label">Wrong article</div>
          <div class="btn-bottom">
            <div class="btn-count" id="c-article">0</div>
            <div class="btn-icon">🔤</div>
          </div>
        </button>
        <button class="track-btn err" onclick="tap('errors','past_tense',this)">
          <div class="btn-label">Wrong past tense</div>
          <div class="btn-bottom">
            <div class="btn-count" id="c-past_tense">0</div>
            <div class="btn-icon">⏪</div>
          </div>
        </button>
        <button class="track-btn err" onclick="tap('errors','hesitation',this)">
          <div class="btn-label">Hesitation</div>
          <div class="btn-bottom">
            <div class="btn-count" id="c-hesitation">0</div>
            <div class="btn-icon">💭</div>
          </div>
        </button>
        <button class="track-btn err" onclick="tap('errors','repetition',this)">
          <div class="btn-label">Repeating word</div>
          <div class="btn-bottom">
            <div class="btn-count" id="c-repetition">0</div>
            <div class="btn-icon">🔁</div>
          </div>
        </button>
      </div>
    </div>

    <!-- POSITIVES -->
    <div>
      <div class="section-label pos">
        Positives
        <div class="section-label-line"></div>
      </div>
      <div class="btn-grid">
        <button class="track-btn pos" onclick="tap('positives','modal',this)">
          <div class="btn-label">Used modal verb</div>
          <div class="btn-bottom">
            <div class="btn-count" id="c-modal">0</div>
            <div class="btn-icon">✅</div>
          </div>
        </button>
        <button class="track-btn pos" onclick="tap('positives','phrasal',this)">
          <div class="btn-label">Used phrasal verb</div>
          <div class="btn-bottom">
            <div class="btn-count" id="c-phrasal">0</div>
            <div class="btn-icon">🔗</div>
          </div>
        </button>
        <button class="track-btn pos" onclick="tap('positives','idiom',this)">
          <div class="btn-label">Used idiom</div>
          <div class="btn-bottom">
            <div class="btn-count" id="c-idiom">0</div>
            <div class="btn-icon">💡</div>
          </div>
        </button>
      </div>
    </div>
  </main>

  <!-- END LESSON -->
  <div class="end-section">
    <button class="end-btn" onclick="showEndSheet()">End Lesson →</button>
  </div>

</div>

<!-- BOTTOM SHEET: End Lesson -->
<div class="overlay" id="end-overlay" onclick="closeSheet(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3>End this lesson?</h3>
    <p>Your session data will be saved and you'll see the summary.</p>
    <div class="sheet-actions">
      <button class="sheet-cancel" onclick="hideEndSheet()">Cancel</button>
      <button class="sheet-confirm" onclick="endLesson()">See Summary →</button>
    </div>
  </div>
</div>

<!-- BOTTOM SHEET: Reset -->
<div class="overlay" id="reset-overlay" onclick="closeResetSheet(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3>Reset all counts?</h3>
    <p>This will clear all taps for the current session.</p>
    <div class="sheet-actions">
      <button class="sheet-cancel" onclick="hideResetSheet()">Cancel</button>
      <button class="sheet-confirm" style="background:#d44232" onclick="doReset()">Reset</button>
    </div>
  </div>
</div>

<script>
  const SESSION_KEY = 'lt_session';

  const LABELS = {
    errors:    { article: 'Wrong article', past_tense: 'Wrong past tense', hesitation: 'Hesitation', repetition: 'Repeating word' },
    positives: { modal: 'Modal verb', phrasal: 'Phrasal verb', idiom: 'Idiom' }
  };

  // ── State ──────────────────────────────────────────────────────────
  let state = {
    errors:    { article: 0, past_tense: 0, hesitation: 0, repetition: 0 },
    positives: { modal: 0, phrasal: 0, idiom: 0 },
    startedAt: null
  };

  function loadState() {
    try {
      const saved = localStorage.getItem(SESSION_KEY);
      if (saved) {
        const parsed = JSON.parse(saved);
        // Only restore if it's from today (< 6 hours old)
        if (parsed.startedAt && Date.now() - parsed.startedAt < 6 * 3600 * 1000) {
          state = parsed;
        } else {
          state.startedAt = Date.now();
          saveState();
        }
      } else {
        state.startedAt = Date.now();
        saveState();
      }
    } catch(e) {
      state.startedAt = Date.now();
    }
    renderAll();
  }

  function saveState() {
    localStorage.setItem(SESSION_KEY, JSON.stringify(state));
  }

  // ── Render ─────────────────────────────────────────────────────────
  function renderAll() {
    let errTotal = 0, posTotal = 0;

    for (const [key, val] of Object.entries(state.errors)) {
      const el = document.getElementById('c-' + key);
      if (el) el.textContent = val;
      errTotal += val;
    }
    for (const [key, val] of Object.entries(state.positives)) {
      const el = document.getElementById('c-' + key);
      if (el) el.textContent = val;
      posTotal += val;
    }

    document.getElementById('total-errors').textContent    = errTotal;
    document.getElementById('total-positives').textContent = posTotal;
  }

  // ── Tap handler ────────────────────────────────────────────────────
  function tap(group, key, btn) {
    state[group][key]++;
    saveState();

    // Update counter display
    const countEl = document.getElementById('c-' + key);
    if (countEl) {
      countEl.textContent = state[group][key];
      countEl.classList.remove('bump');
      void countEl.offsetWidth; // reflow
      countEl.classList.add('bump');
    }

    // Flash effect
    btn.classList.add('flash');
    setTimeout(() => btn.classList.remove('flash'), 280);

    // Update totals
    let errTotal = 0, posTotal = 0;
    for (const v of Object.values(state.errors))    errTotal += v;
    for (const v of Object.values(state.positives)) posTotal += v;
    document.getElementById('total-errors').textContent    = errTotal;
    document.getElementById('total-positives').textContent = posTotal;
  }

  // ── End lesson sheet ──────────────────────────────────────────────
  function showEndSheet() {
    document.getElementById('end-overlay').classList.add('show');
  }
  function hideEndSheet() {
    document.getElementById('end-overlay').classList.remove('show');
  }
  function closeSheet(e) {
    if (e.target === document.getElementById('end-overlay')) hideEndSheet();
  }
  function endLesson() {
    // Save final state with timestamp
    state.endedAt = Date.now();
    localStorage.setItem(SESSION_KEY, JSON.stringify(state));
    window.location.href = 'summary.html';
  }

  // ── Reset sheet ───────────────────────────────────────────────────
  function confirmReset() {
    document.getElementById('reset-overlay').classList.add('show');
  }
  function hideResetSheet() {
    document.getElementById('reset-overlay').classList.remove('show');
  }
  function closeResetSheet(e) {
    if (e.target === document.getElementById('reset-overlay')) hideResetSheet();
  }
  function doReset() {
    state = {
      errors:    { article: 0, past_tense: 0, hesitation: 0, repetition: 0 },
      positives: { modal: 0, phrasal: 0, idiom: 0 },
      startedAt: Date.now()
    };
    saveState();
    renderAll();
    hideResetSheet();
  }

  // ── Init ──────────────────────────────────────────────────────────
  loadState();
</script>

</body>
</html>
