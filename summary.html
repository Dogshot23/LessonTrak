<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-KKHTF8PMYV"></script>
  <script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Lesson Summary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:        #F5F3EE;
      --paper:        #FFFFFF;
      --ink:          #1A1714;
      --ink-soft:     #374151;
      --ink-faint:    #6B7280;
      --border:       #E5E7EB;
      --border-soft:  rgba(26,23,20,.06);
      --coral:        #E8553E;
      --coral-bg:     rgba(232,85,62,.07);
      --coral-border: rgba(232,85,62,.16);
      --coral-track:  rgba(232,85,62,.13);
      --sage:         #3D8C6A;
      --sage-bg:      rgba(61,140,106,.07);
      --sage-border:  rgba(61,140,106,.16);
      --sage-track:   rgba(61,140,106,.13);
      --slate:        #4A6FA5;
      --slate-bg:     rgba(74,111,165,.07);
      --slate-border: rgba(74,111,165,.16);
    }

    html, body {
      height: auto;
      overflow-y: auto;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;           /* explicit base — scales all rem values */
      background: var(--cream);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }

    .app {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      min-height: 100vh;
      max-width: 560px;
      margin: 0 auto;
      padding: env(safe-area-inset-top, 0px) 0 env(safe-area-inset-bottom, 0px);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--cream);
      flex-shrink: 0;
      gap: 1rem;
    }
    .header-left a {
      font-family: 'Lora', serif;
      font-weight: 700;
      font-size: 1rem;
      color: var(--ink-soft);
      text-decoration: none;
      transition: color .2s;
      white-space: nowrap;
    }
    .header-left a:hover { color: var(--ink); }

    .header-title {
      font-family: 'Lora', serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--ink);
      opacity: .6;
      white-space: nowrap;
    }

    /* ── "New Lesson" pill button — replaces the massive full-width bar ── */
    .header-new-btn {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: 100px;
      padding: .55rem 1.25rem .55rem 1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      font-weight: 700;
      letter-spacing: -.01em;
      cursor: pointer;
      transition: background .18s, transform .1s;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }
    .header-new-btn:hover  { background: #2e2a26; }
    .header-new-btn:active { transform: scale(.95); }

    /* ─── MAIN ─── */
    main {
      flex: 1;
      padding: 1.5rem 1.25rem 2.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ─── SUMMARY GRID — mobile: single column ─── */
    .summary-grid {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .sum-col {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ─── CARDS ─── */
    .card {
      background: var(--paper);
      border-radius: 14px;
      border: 1px solid var(--border);
      padding: 1.5rem 1.5rem;
    }

    .card-label {
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 1rem;
    }

    /* ─── STAT GRID ─── */
    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .75rem;
    }
    .stat-item {
      background: var(--cream);
      border-radius: 11px;
      padding: 1.1rem 1.1rem;
      border: 1px solid var(--border-soft);
    }
    .stat-val {
      font-family: 'Lora', serif;
      font-size: 2.6rem;
      font-weight: 700;
      line-height: 1;
    }
    .stat-val.err { color: var(--coral); }
    .stat-val.pos { color: var(--sage); }
    .stat-lbl {
      font-size: .82rem;
      font-weight: 600;
      color: var(--ink-soft);
      margin-top: .4rem;
    }

    /* ─────────────────────────────────────────────────────────────────
       BREAKDOWN BARS — BUG FIX
       Root cause: both .breakdown-bar-wrap and .breakdown-bar were
       rendered as <span> elements. <span> is inline by default.
       Inline elements ignore explicit height and percentage-height
       children — so the fill rendered at 0px tall and the track's
       overflow:hidden clipped it to nothing even though width was set.

       Fix 1: display:block on both wrapper and fill.
       Fix 2: explicit px height on both (not height:100% on child).
       Fix 3: bars start at width:0% in CSS; JS uses rAF double-frame
               to let the browser paint the 0% state first, then applies
               the target width so the CSS transition actually fires.
    ───────────────────────────────────────────────────────────────── */
    .breakdown-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: .9rem;
    }

    .breakdown-item {
      display: flex;
      align-items: center;
      gap: .85rem;
    }

    .breakdown-name {
      font-size: .95rem;
      font-weight: 500;
      color: var(--ink-soft);
      flex: 0 0 auto;
      max-width: 46%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* FIXED: explicit block + px height so % children resolve correctly */
    .breakdown-bar-wrap {
      flex: 1;
      display: block;
      height: 12px;
      border-radius: 100px;
      overflow: hidden;
      min-width: 0;
      background: #e9eaec;     /* solid neutral track — always visible */
    }
    /* Override with coloured tinted tracks per type */
    .breakdown-bar-wrap.err { background: var(--coral-track); }
    .breakdown-bar-wrap.pos { background: var(--sage-track); }

    .breakdown-bar {
      display: block;
      width: 0%;               /* BASE STATE: 0% — JS animates to real % */
      height: 12px;            /* explicit px, not 100%, avoids inline quirks */
      border-radius: 100px;
      transition: width 0.45s cubic-bezier(.25,.8,.25,1);
    }
    .breakdown-bar.err { background: var(--coral); }
    .breakdown-bar.pos { background: var(--sage); }

    .breakdown-count {
      font-weight: 700;
      font-size: .95rem;
      min-width: 1.6rem;
      text-align: right;
      flex-shrink: 0;
    }
    .breakdown-count.err { color: var(--coral); }
    .breakdown-count.pos { color: var(--sage); }

    /* ─── NEW LANGUAGE LIST ─── */
    .lang-chips {
      display: flex;
      flex-wrap: wrap;
      gap: .6rem;
    }
    .lang-chip {
      background: var(--slate-bg);
      border: 1px solid var(--slate-border);
      color: var(--slate);
      border-radius: 100px;
      padding: .4rem 1rem;
      font-size: .95rem;
      font-weight: 600;
    }
    .lang-empty {
      font-size: .95rem;
      color: var(--ink-faint);
      font-style: italic;
    }

    /* ─── TUTOR NOTES ─── */
    .notes-text {
      font-size: 1rem;
      color: var(--ink-soft);
      line-height: 1.75;
      white-space: pre-wrap;
    }
    .notes-empty {
      font-size: .95rem;
      color: var(--ink-faint);
      font-style: italic;
    }

    /* ─── NEXT LESSON FOCUS CARD ─── */
    .focus-card {
      background: var(--paper);
      border-radius: 14px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .focus-card-header {
      padding: 1.25rem 1.5rem 1.1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: .6rem;
    }

    .focus-card-label {
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--ink-faint);
    }

    /* "Top focus" pill */
    .focus-top-pill {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      font-size: .85rem;
      font-weight: 700;
      color: var(--coral);
      background: var(--coral-bg);
      border: 1px solid var(--coral-border);
      border-radius: 100px;
      padding: .32rem .9rem;
      width: fit-content;
      letter-spacing: .01em;
    }
    .focus-top-pill.neutral {
      color: var(--ink-soft);
      background: rgba(26,23,20,.04);
      border-color: rgba(26,23,20,.1);
    }

    .focus-items-list {
      padding: 1.1rem 1.5rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .focus-item {
      background: var(--cream);
      border-radius: 10px;
      border: 1px solid var(--border-soft);
      padding: 1rem 1.1rem .95rem;
    }

    .focus-item-tag {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .07em;
      text-transform: uppercase;
      margin-bottom: .55rem;
      border-radius: 100px;
      padding: .25rem .7rem;
    }
    .focus-item-tag.err {
      color: var(--coral);
      background: var(--coral-bg);
      border: 1px solid var(--coral-border);
    }
    .focus-item-tag.pos {
      color: var(--sage);
      background: var(--sage-bg);
      border: 1px solid var(--sage-border);
    }

    .focus-item-count { font-weight: 700; opacity: .7; }

    .focus-item-activity {
      font-size: 1rem;
      color: var(--ink);
      line-height: 1.7;
      font-weight: 500;
      transition: opacity .16s ease;
    }
    .focus-item-activity.swapping { opacity: 0; }

    .focus-item-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: .7rem;
    }

    .focus-refresh-btn {
      background: none;
      border: 1px solid rgba(26,23,20,.15);
      border-radius: 8px;
      padding: .38rem .85rem;
      font-family: 'DM Sans', sans-serif;
      font-size: .85rem;
      font-weight: 600;
      color: var(--ink-soft);
      cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .focus-refresh-btn:hover {
      background: rgba(26,23,20,.05);
      color: var(--ink);
      border-color: rgba(26,23,20,.25);
    }
    .focus-refresh-btn:active { transform: scale(.95); }

    .focus-empty {
      padding: 1.1rem 1.5rem 1.25rem;
      font-size: .95rem;
      color: var(--ink-faint);
      font-style: italic;
      line-height: 1.6;
    }

    /* ─── DESKTOP: strict 3-column grid ─── */
    @media (min-width: 900px) {
      html, body { height: auto; overflow-y: auto; }

      .app {
        max-width: none;
        min-height: 100vh;
      }

      header { padding: 1rem 2rem; }
      main   { padding: 1.5rem 2rem 2.5rem; }

      /* FIXED: equal 3 columns, cards don't stretch to create voids */
      .summary-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 2rem;
        align-items: start;   /* each col hugs its own content height */
      }

      .sum-col {
        gap: 1.25rem;
        align-self: start;    /* prevent tall col bleeding into short ones */
      }

      /* Sticky focus column so it stays visible while scrolling cols 1 & 2 */
      #focus-col .focus-card {
        position: sticky;
        top: 1.25rem;
      }
    }
  </style>

<body>

<div class="app">

  <header>
    <div class="header-left">
      <a href="index.html">← LessonTracker</a>
    </div>
    <div class="header-title">Lesson Summary</div>
    <!-- Sleek pill replaces the giant full-width black bar -->
    <button class="header-new-btn" onclick="startNewLesson()">
      + New Lesson
    </button>
  </header>

  <main>

    <div class="summary-grid">

      <!-- ── COL 1: Session stats + Errors ── -->
      <div class="sum-col">

        <div class="card">
          <div class="card-label">Session Overview</div>
          <div class="stat-grid">
            <div class="stat-item">
              <div class="stat-val err" id="sum-errors">—</div>
              <div class="stat-lbl">Errors tracked</div>
            </div>
            <div class="stat-item">
              <div class="stat-val pos" id="sum-positives">—</div>
              <div class="stat-lbl">Positives noted</div>
            </div>
            <div class="stat-item" style="grid-column:1/-1;">
              <div class="stat-val" id="sum-duration" style="font-size:1.15rem;">—</div>
              <div class="stat-lbl">Lesson duration</div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-label">Errors</div>
          <ul class="breakdown-list" id="error-breakdown"></ul>
        </div>

      </div>

      <!-- ── COL 2: Positives + New Language + Tutor Notes ── -->
      <div class="sum-col">

        <div class="card">
          <div class="card-label">Positives</div>
          <ul class="breakdown-list" id="positive-breakdown"></ul>
        </div>

        <div class="card">
          <div class="card-label">New Language</div>
          <div class="lang-chips" id="lang-chips"></div>
        </div>

        <div class="card">
          <div class="card-label">Tutor Notes</div>
          <div id="notes-display"></div>
        </div>

      </div>

      <!-- ── COL 3: Next Lesson Focus ── -->
      <div class="sum-col" id="focus-col">

        <div class="focus-card" id="focus-card">
          <div class="focus-card-header">
            <div class="focus-card-label">Next Lesson Focus</div>
            <div id="focus-pill-wrap"></div>
          </div>
          <div id="focus-body"></div>
        </div>

      </div>

    </div><!-- /.summary-grid -->

  </main>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// ACTIVITY POOL — specific, practical activities per tracker key
// ─────────────────────────────────────────────────────────────────────────────

const activityPool = {

  articles: [
    "Rebuild 5 sentences from today's spoken output, choosing explicitly between a, an, the, or zero article for each noun",
    "Review a transcript excerpt from today and flag every point where a missing or wrong article shifted the meaning",
    "Run a rapid-fire noun phrase drill using objects and concepts named during today's lesson — student must article each one before speaking",
    "Give the student 6 nouns from the session and ask them to produce a sentence for each, justifying their article choice aloud"
  ],

  tense: [
    "Map today's spoken stories onto a visual timeline — past, present, future — and correct any verb forms that land in the wrong zone",
    "Re-tell today's main discussion topic entirely in the third-person past tense with no present-tense leakage",
    "Transform 5 tense slips from today into targeted drill sentences using the correct form",
    "Give the student 3 prompts requiring different time frames and have them produce one accurate sentence each, naming the tense used"
  ],

  word_order: [
    "Take 4 scrambled sentences built from today's actual content and ask the student to reconstruct them correctly without help",
    "Contrast two versions of the same sentence — correct and inverted word order — and ask the student to identify and explain the error",
    "Produce 3 original sentences describing today's topic with deliberate focus on subject–verb–object–adverb sequencing",
    "Drill adjective and adverb placement using today's content: mid-sentence vs end-position — one correct, one wrong, student chooses"
  ],

  vocabulary: [
    "Review 5 over-general words used today (nice, good, thing) and replace each with a more precise, register-appropriate alternative",
    "Match 4 words from today's lesson to stronger synonyms and use each in a new sentence that makes the improvement visible",
    "Identify 3 confusable word pairs triggered by today's topic (e.g. make/do, say/tell) and produce one sentence per word",
    "Ask the student to describe today's topic again, this time banning any vague filler words used in the original session"
  ],

  pronunciation: [
    "Isolate the top 2 mispronounced sounds from today and drill each in 3 minimal pairs before returning to natural connected speech",
    "Practice sentence stress patterns from today's content — identify which syllables were reduced or misplaced and correct them",
    "Run a connected-speech drill using full phrases from today's lesson with focus on linking, elision, and word boundaries",
    "Ask the student to say 5 words from today slowly, then at natural speed — note where accuracy breaks down under pressure"
  ],

  fluency: [
    "Practice 45-second timed fluency bursts on today's topic with zero mid-sentence abandonment allowed — keep going regardless",
    "Introduce 3 turn-taking bridging phrases — 'Mind you', 'As I was saying', 'What I mean is' — and drill each on today's topic",
    "Re-narrate today's discussion from start to finish without stopping, using any available words to bridge gaps and maintain flow",
    "Run a 'speak first, correct later' drill: student talks for 60 seconds uninterrupted, then reviews weak moments with the tutor"
  ],

  expression: [
    "Take 2 ideas from today that broke down and build model sentences together that capture exactly what the student was trying to say",
    "Teach 3 circumlocution strategies — defining by function, by example, by contrast — using today's topic as the practice frame",
    "Ask the student to re-explain the most complex idea from today using completely different words, starting from scratch",
    "Give the student a target concept from today and have them explain it three different ways to practise idea flexibility"
  ],

  good_grammar: [
    "Use today's accurate sentence structures as models: ask the student to produce 3 new ones in a slightly different topic context",
    "Build on today's grammatical accuracy by extending accurate sentences into longer, more complex structures — add a clause or qualifier",
    "Identify the specific grammar pattern the student hit consistently today and push it into a harder, less predictable context"
  ],

  good_vocab: [
    "Extend today's strong word choices into word families — identify related noun, verb, adjective, and adverb forms for each",
    "Ask the student to use today's best vocabulary in a new context: different topic, same register, showing depth of understanding",
    "Build a collocations map around the strongest or most precise word the student produced today"
  ],

  complex_structure: [
    "Take today's best complex sentence and extend it further with an additional subordinate clause or qualifying phrase",
    "Ask the student to produce 3 more complex sentences of the same structural type used successfully in today's session",
    "Identify the subordinating conjunction or relative clause used well today and drill it in 4 new, unrelated sentences"
  ],

  connector: [
    "Challenge the student to link 4 consecutive ideas from today's topic without repeating the same connector twice",
    "Introduce 3 connectors not used today — contrast, cause, concession — and practise each one with a sentence from today's material",
    "Build a short spoken argument on today's topic using at least 5 distinct linking devices, one per point"
  ],

  natural_phrase: [
    "Record the natural phrase used today, explore its register and typical context, then produce 2 new example sentences",
    "Find 2 related expressions in the same semantic field as today's native-like phrase and practise all three together in sequence",
    "Ask the student to use today's phrase in a brand-new context to confirm genuine understanding rather than surface recall"
  ]
};

// ─────────────────────────────────────────────────────────────────────────────
// SHARED DATA
// ─────────────────────────────────────────────────────────────────────────────

const LABELS = {
  errors: {
    articles:      'Articles',
    tense:         'Tense',
    word_order:    'Word Order',
    vocabulary:    'Wrong Word Choice',
    pronunciation: 'Unclear Pronunciation',
    fluency:       'Hesitation / Pauses',
    expression:    'Struggled to Express'
  },
  positives: {
    good_grammar:      'Accurate Sentence',
    good_vocab:        'Good Word Choice',
    complex_structure: 'Complex Sentence',
    connector:         'Linked Ideas Clearly',
    natural_phrase:    'Native-like Phrase'
  }
};

const SESSION_KEY = 'lt_session';

// ─────────────────────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────────────────────

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function formatDuration(ms) {
  if (!ms || ms < 0) return '—';
  const totalMin = Math.round(ms / 60000);
  if (totalMin < 1) return '< 1 min';
  if (totalMin < 60) return totalMin + ' min';
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  return m > 0 ? `${h}h ${m}m` : `${h}h`;
}

const focusItemState = {};

function pickDifferentIndex(arr, currentIdx) {
  if (arr.length <= 1) return 0;
  let next;
  do { next = Math.floor(Math.random() * arr.length); }
  while (next === currentIdx);
  return next;
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER BREAKDOWN BARS
//
// MATH FIX: bars are proportional to the TOTAL SUM of all entries in the
// block, NOT the maximum single value. This means a count of 1 in a block
// totalling 13 renders as (1/13)*100 ≈ 7.7% — a tiny sliver, as intended.
// Previously max=100% caused every top item to fill the full bar width AND
// any lone item (count=1, max=1) would also render at 100%.
// ─────────────────────────────────────────────────────────────────────────────

function renderBreakdown(ulId, dataObj, labelMap, cssClass) {
  const ul = document.getElementById(ulId);
  if (!ul) return;
  ul.innerHTML = '';

  const entries = Object.entries(dataObj)
    .filter(([, v]) => v > 0)
    .sort(([, a], [, b]) => b - a);

  if (entries.length === 0) {
    ul.innerHTML = '<li style="font-size:.82rem;color:var(--ink-faint);font-style:italic">None recorded</li>';
    return;
  }

  // FIX: denominator = sum of ALL counts in this block, not the max
  const total = entries.reduce((sum, [, v]) => sum + v, 0);

  entries.forEach(([key, val]) => {
    // Percentage relative to total — a count of 1 in 13 = ~7.7%, not 100%
    const percentage = total > 0 ? (val / total) * 100 : 0;
    const name = labelMap[key] || key;

    const li = document.createElement('li');
    li.className = 'breakdown-item';

    const nameEl = document.createElement('span');
    nameEl.className = 'breakdown-name';
    nameEl.textContent = name;

    const trackEl = document.createElement('div');
    trackEl.className = `breakdown-bar-wrap ${cssClass}`;

    const fillEl = document.createElement('div');
    fillEl.className = `breakdown-bar ${cssClass}`;
    // CSS starts width at 0%; rAF animates to real calculated %
    trackEl.appendChild(fillEl);

    const countEl = document.createElement('span');
    countEl.className = `breakdown-count ${cssClass}`;
    countEl.textContent = val;

    li.appendChild(nameEl);
    li.appendChild(trackEl);
    li.appendChild(countEl);
    ul.appendChild(li);

    // Double rAF: paint 0% on frame 1, apply target on frame 2 → CSS transition fires
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        fillEl.style.width = `${percentage}%`;
      });
    });
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER NEXT LESSON FOCUS
// ─────────────────────────────────────────────────────────────────────────────

function getTopTags(errors, positives, limit) {
  const all = [];
  for (const [k, v] of Object.entries(errors))    { if (v > 0) all.push({ key: k, count: v, type: 'err' }); }
  for (const [k, v] of Object.entries(positives)) { if (v > 0) all.push({ key: k, count: v, type: 'pos' }); }
  return all.sort((a, b) => b.count - a.count).slice(0, limit);
}

function renderFocusCard(errors, positives) {
  const body     = document.getElementById('focus-body');
  const pillWrap = document.getElementById('focus-pill-wrap');
  if (!body) return;

  const topTags   = getTopTags(errors, positives, 3);
  const topErrors = topTags.filter(t => t.type === 'err');

  // Render the "Top focus" pill in the card header
  if (pillWrap) {
    pillWrap.innerHTML = '';
    const pill = document.createElement('div');
    if (topTags.length === 0) {
      pill.className   = 'focus-top-pill neutral';
      pill.textContent = 'No session data yet';
    } else if (topErrors.length > 0) {
      pill.className   = 'focus-top-pill';
      pill.textContent = `Top focus: ${LABELS.errors[topErrors[0].key] || topErrors[0].key}`;
    } else {
      pill.className   = 'focus-top-pill neutral';
      pill.textContent = `Based on today's session`;
    }
    pillWrap.appendChild(pill);
  }

  if (topTags.length === 0) {
    body.innerHTML = '<p class="focus-empty">No data recorded — tap buttons during the lesson to generate targeted activities here.</p>';
    return;
  }

  body.innerHTML = '';
  const list = document.createElement('div');
  list.className = 'focus-items-list';

  topTags.forEach(({ key, count, type }) => {
    const pool = activityPool[key];
    if (!pool || pool.length === 0) return;

    if (focusItemState[key] === undefined) {
      focusItemState[key] = Math.floor(Math.random() * pool.length);
    }
    const activity = pool[focusItemState[key]];
    const label    = (type === 'err' ? LABELS.errors[key] : LABELS.positives[key]) || key;

    const item = document.createElement('div');
    item.className = 'focus-item';
    item.dataset.key = key;
    item.innerHTML =
      `<span class="focus-item-tag ${escapeHtml(type)}">` +
        `${escapeHtml(label)}<span class="focus-item-count"> ×${count}</span>` +
      `</span>` +
      `<p class="focus-item-activity" id="focus-activity-${escapeHtml(key)}">${escapeHtml(activity)}</p>` +
      `<div class="focus-item-footer">` +
        `<button class="focus-refresh-btn" onclick="refreshActivity('${escapeHtml(key)}')">↻ Different task</button>` +
      `</div>`;

    list.appendChild(item);
  });

  body.appendChild(list);
}

function refreshActivity(key) {
  const pool = activityPool[key];
  if (!pool || pool.length <= 1) return;
  const el = document.getElementById('focus-activity-' + key);
  if (!el) return;
  el.classList.add('swapping');
  setTimeout(() => {
    focusItemState[key] = pickDifferentIndex(pool, focusItemState[key]);
    el.textContent = pool[focusItemState[key]];
    el.classList.remove('swapping');
  }, 160);
}

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────

function startNewLesson() {
  window.location.href = 'tracker.html';
}

document.addEventListener('DOMContentLoaded', () => {

  let session = null;
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (raw) session = JSON.parse(raw);
  } catch (e) {}

  // Demo mode: inject synthetic data so the page is previewable without a real session
  const isDemo = new URLSearchParams(window.location.search).get('demo') === 'true';
  if (isDemo && (!session || Object.values(session?.errors || {}).every(v => v === 0))) {
    session = {
      errors:    { articles: 5, fluency: 4, tense: 2, word_order: 1, vocabulary: 0, pronunciation: 0, expression: 0 },
      positives: { good_vocab: 3, connector: 2, good_grammar: 1, complex_structure: 0, natural_phrase: 0 },
      newLanguage: ['go through the motions', 'on the fence', 'come to terms with'],
      startedAt: Date.now() - 37 * 60000,
      endedAt:   Date.now()
    };
  }

  const errors    = session?.errors    || {};
  const positives = session?.positives || {};
  const language  = Array.isArray(session?.newLanguage) ? session.newLanguage : [];
  const startedAt = session?.startedAt || null;
  const endedAt   = session?.endedAt   || null;

  // Duration
  document.getElementById('sum-duration').textContent =
    formatDuration(startedAt && endedAt ? endedAt - startedAt : null);

  // Totals
  const errTotal = Object.values(errors).reduce((a, b) => a + b, 0);
  const posTotal = Object.values(positives).reduce((a, b) => a + b, 0);
  document.getElementById('sum-errors').textContent    = errTotal;
  document.getElementById('sum-positives').textContent = posTotal;

  // Breakdowns — pass cssClass only; max is derived inside renderBreakdown
  renderBreakdown('error-breakdown',    errors,    LABELS.errors,    'err');
  renderBreakdown('positive-breakdown', positives, LABELS.positives, 'pos');

  // Language chips
  const chipsEl = document.getElementById('lang-chips');
  if (language.length === 0) {
    chipsEl.innerHTML = '<span class="lang-empty">Nothing recorded</span>';
  } else {
    language.forEach(item => {
      const chip = document.createElement('span');
      chip.className = 'lang-chip';
      chip.textContent = item;
      chipsEl.appendChild(chip);
    });
  }

  // Tutor notes
  const notes   = sessionStorage.getItem('tutorNotes') || '';
  const notesEl = document.getElementById('notes-display');
  if (notes.trim()) {
    notesEl.className   = 'notes-text';
    notesEl.textContent = notes;
  } else {
    notesEl.className   = 'notes-empty';
    notesEl.textContent = 'No notes added.';
  }

  // Next Lesson Focus
  renderFocusCard(errors, positives);
});
</script>
