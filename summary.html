<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Lesson Summary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:        #F7F4EF;
      --paper:        #FFFFFF;
      --ink:          #1A1714;
      --ink-soft:     #6B6560;
      --ink-faint:    #C5C0BA;
      --coral:        #E8553E;
      --coral-bg:     rgba(232,85,62,.08);
      --coral-border: rgba(232,85,62,.18);
      --sage:         #3D8C6A;
      --sage-bg:      rgba(61,140,106,.08);
      --sage-border:  rgba(61,140,106,.18);
      --slate:        #4A6FA5;
      --slate-bg:     rgba(74,111,165,.08);
      --slate-border: rgba(74,111,165,.18);
    }

    html, body {
      min-height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
    }

    .app {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      min-height: 100vh;
      max-width: 540px;
      margin: 0 auto;
      padding: env(safe-area-inset-top, 0px) 0 env(safe-area-inset-bottom, 0px);
    }

    /* ─── HEADER ─── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .9rem 1.25rem .7rem;
      border-bottom: 1px solid rgba(26,23,20,.07);
      background: var(--cream);
      flex-shrink: 0;
    }
    .header-left a {
      font-family: 'Lora', serif;
      font-weight: 700;
      font-size: .95rem;
      color: var(--ink);
      text-decoration: none;
      opacity: .6;
      transition: opacity .2s;
    }
    .header-left a:hover { opacity: 1; }
    .header-title {
      font-family: 'Lora', serif;
      font-size: .95rem;
      font-weight: 700;
      color: var(--ink);
    }
    .header-spacer { width: 60px; }

    /* ─── MAIN ─── */
    main {
      flex: 1;
      padding: 1rem 1rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: .85rem;
    }

    /* ─── HERO TOTALS ─── */
    .hero {
      background: var(--ink);
      border-radius: 16px;
      padding: 1.25rem 1.25rem 1.1rem;
      color: #fff;
    }
    .hero-duration {
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      opacity: .45;
      margin-bottom: .9rem;
    }
    .hero-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: .5rem;
    }
    .hero-stat { text-align: center; }
    .hero-val {
      font-family: 'Lora', serif;
      font-size: 2.4rem;
      font-weight: 700;
      line-height: 1;
    }
    .hero-stat:first-child .hero-val { color: #f98b79; }
    .hero-stat:last-child  .hero-val { color: #6fcca6; }
    .hero-lbl {
      font-size: .62rem;
      font-weight: 600;
      letter-spacing: .07em;
      text-transform: uppercase;
      opacity: .45;
      margin-top: .3rem;
    }
    .hero-divider {
      width: 1px; height: 40px;
      background: rgba(255,255,255,.12);
      margin: 0 auto;
    }

    /* ─── SECTION LABEL ─── */
    .section-label {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: .55rem;
    }
    .section-label.err  { color: var(--coral); }
    .section-label.pos  { color: var(--sage); }
    .section-label.lang { color: var(--slate); }
    .section-label-line {
      flex: 1; height: 1px;
      background: currentColor;
      opacity: .2;
    }

    /* ─── BREAKDOWN CARD ─── */
    .breakdown-card {
      background: var(--paper);
      border-radius: 13px;
      border: 1px solid rgba(26,23,20,.06);
      overflow: hidden;
    }
    .breakdown-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .6rem .9rem;
      border-bottom: 1px solid rgba(26,23,20,.05);
    }
    .breakdown-row:last-child { border-bottom: none; }
    .breakdown-name {
      font-size: .875rem;
      font-weight: 500;
      color: var(--ink);
    }
    .breakdown-count {
      font-family: 'Lora', serif;
      font-size: 1.05rem;
      font-weight: 700;
    }
    .breakdown-row.err-row .breakdown-count { color: var(--coral); }
    .breakdown-row.pos-row .breakdown-count { color: var(--sage); }
    .breakdown-row.zero .breakdown-name,
    .breakdown-row.zero .breakdown-count { opacity: .3; }

    /* ─── NEW LANGUAGE COVERED ─── */
    .lang-card {
      background: var(--paper);
      border-radius: 13px;
      border: 1px solid var(--slate-border);
      padding: .7rem .9rem .8rem;
    }
    .lang-bullet-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: .35rem;
    }
    .lang-bullet-list li {
      display: flex;
      align-items: baseline;
      gap: .5rem;
      font-size: .875rem;
      color: var(--ink);
    }
    .lang-bullet-list li::before {
      content: '–';
      color: var(--slate);
      font-weight: 700;
      flex-shrink: 0;
    }

    /* ─── FOOTER ACTIONS ─── */
    .footer-actions {
      padding: .6rem 1rem calc(.8rem + env(safe-area-inset-bottom, 0px));
      border-top: 1px solid rgba(26,23,20,.07);
      background: var(--cream);
      flex-shrink: 0;
      display: flex;
      gap: .6rem;
    }
    .btn-secondary {
      flex: 1;
      padding: .9rem;
      background: var(--paper);
      color: var(--ink);
      border: 1.5px solid rgba(26,23,20,.12);
      border-radius: 13px;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .12s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-primary {
      flex: 1;
      padding: .9rem;
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: 13px;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s, transform .12s;
      -webkit-tap-highlight-color: transparent;
      letter-spacing: -.01em;
    }
    .btn-secondary:hover { background: #ede9e3; }
    .btn-primary:hover   { background: #2e2a26; }
    .btn-secondary:active, .btn-primary:active { transform: scale(.97); }
  </style>
</head>
<body>

<div class="app">

  <header>
    <div class="header-left">
      <a href="index.html">← LessonTracker</a>
    </div>
    <div class="header-title">Summary</div>
    <div class="header-spacer"></div>
  </header>

  <main id="summary-main">
    <!-- populated by JS -->
  </main>

  <div class="footer-actions">
    <button class="btn-secondary" onclick="goBack()">← Back</button>
    <button class="btn-primary" onclick="newLesson()">New Lesson</button>
  </div>

</div>

<script>
  const SESSION_KEY = 'lt_session';

  const ERROR_LABELS = {
    articles:      'Articles',
    tense:         'Tense',
    word_order:    'Word Order',
    vocabulary:    'Vocabulary',
    pronunciation: 'Pronunciation',
    fluency:       'Fluency'
  };
  const POSITIVE_LABELS = {
    good_grammar:      'Good Grammar',
    good_vocab:        'Good Vocabulary',
    complex_structure: 'Complex Structure',
    connector:         'Connector Used',
    natural_phrase:    'Natural Phrase'
  };

  function formatDuration(ms) {
    if (!ms || ms <= 0) return null;
    const totalMin = Math.round(ms / 60000);
    if (totalMin < 1) return 'Under 1 min';
    const h = Math.floor(totalMin / 60);
    const m = totalMin % 60;
    if (h === 0) return `${m} min`;
    return m === 0 ? `${h}h` : `${h}h ${m}min`;
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function buildSummary() {
    const container = document.getElementById('summary-main');
    let session;

    try {
      const raw = localStorage.getItem(SESSION_KEY);
      session = raw ? JSON.parse(raw) : null;
    } catch(e) { session = null; }

    if (!session) {
      container.innerHTML = '<p style="padding:1.5rem;color:var(--ink-soft);font-size:.9rem;">No session data found.</p>';
      return;
    }

    const errors    = session.errors    || {};
    const positives = session.positives || {};
    const newLang   = Array.isArray(session.newLanguage) ? session.newLanguage : [];

    let errTotal = 0, posTotal = 0;
    for (const v of Object.values(errors))    errTotal += v;
    for (const v of Object.values(positives)) posTotal += v;

    const duration = (session.startedAt && session.endedAt)
      ? formatDuration(session.endedAt - session.startedAt)
      : null;

    // ── Hero ──
    let html = `
      <div class="hero">
        ${duration ? `<div class="hero-duration">${duration}</div>` : ''}
        <div class="hero-row">
          <div class="hero-stat">
            <div class="hero-val">${errTotal}</div>
            <div class="hero-lbl">Errors</div>
          </div>
          <div class="hero-divider"></div>
          <div class="hero-stat">
            <div class="hero-val">${posTotal}</div>
            <div class="hero-lbl">Positives</div>
          </div>
        </div>
      </div>
    `;

    // ── Errors breakdown ──
    html += `
      <div>
        <div class="section-label err">Errors <div class="section-label-line"></div></div>
        <div class="breakdown-card">
    `;
    for (const [key, label] of Object.entries(ERROR_LABELS)) {
      const val = errors[key] || 0;
      html += `
        <div class="breakdown-row err-row${val === 0 ? ' zero' : ''}">
          <span class="breakdown-name">${label}</span>
          <span class="breakdown-count">${val}</span>
        </div>
      `;
    }
    html += `</div></div>`;

    // ── Positives breakdown ──
    html += `
      <div>
        <div class="section-label pos">Positives <div class="section-label-line"></div></div>
        <div class="breakdown-card">
    `;
    for (const [key, label] of Object.entries(POSITIVE_LABELS)) {
      const val = positives[key] || 0;
      html += `
        <div class="breakdown-row pos-row${val === 0 ? ' zero' : ''}">
          <span class="breakdown-name">${label}</span>
          <span class="breakdown-count">${val}</span>
        </div>
      `;
    }
    html += `</div></div>`;

    // ── New Language Covered (hidden if empty) ──
    if (newLang.length > 0) {
      html += `
        <div>
          <div class="section-label lang">New Language Covered <div class="section-label-line"></div></div>
          <div class="lang-card">
            <ul class="lang-bullet-list">
              ${newLang.map(item => `<li>${escapeHtml(item)}</li>`).join('')}
            </ul>
          </div>
        </div>
      `;
    }

    container.innerHTML = html;
  }

  function goBack() {
    window.location.href = 'tracker.html';
  }

  function newLesson() {
    // Clear session and start fresh
    try { localStorage.removeItem(SESSION_KEY); } catch(e) {}
    window.location.href = 'tracker.html';
  }

  buildSummary();
</script>

</body>
</html>
