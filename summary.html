<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Lesson Summary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,600;0,700;1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:      #F7F4EF;
      --paper:      #FFFFFF;
      --ink:        #1A1714;
      --ink-soft:   #6B6560;
      --ink-faint:  #C5C0BA;
      --coral:      #E8553E;
      --sage:       #3D8C6A;
      --amber:      #D4850A;
      --amber-bg:   rgba(212,133,10,.09);
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
      padding-bottom: 3rem;
    }

    /* ─── HEADER ─── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .9rem 1.25rem;
      border-bottom: 1px solid rgba(26,23,20,.07);
      background: var(--cream);
      position: sticky; top: 0; z-index: 10;
    }
    .back-link {
      font-size: .85rem;
      font-weight: 500;
      color: var(--ink-soft);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: .3rem;
      transition: color .2s;
    }
    .back-link:hover { color: var(--ink); }
    .header-title {
      font-family: 'Lora', serif;
      font-size: .95rem;
      font-weight: 700;
    }
    .new-btn {
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: 100px;
      font-family: 'DM Sans', sans-serif;
      font-size: .78rem;
      font-weight: 600;
      padding: .4rem .9rem;
      cursor: pointer;
      text-decoration: none;
      transition: background .2s, transform .12s;
    }
    .new-btn:hover  { background: var(--coral); }
    .new-btn:active { transform: scale(.96); }

    /* ─── MAIN ─── */
    main {
      max-width: 540px;
      margin: 0 auto;
      padding: 1.5rem 1.1rem 0;
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
    }

    /* ─── HERO SCORE ─── */
    .score-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .75rem;
      animation: fadeUp .4s ease both;
    }
    .score-card {
      background: var(--paper);
      border-radius: 16px;
      padding: 1.1rem 1rem;
      border: 1px solid rgba(26,23,20,.06);
      text-align: center;
    }
    .score-val {
      font-family: 'Lora', serif;
      font-size: 2.5rem;
      font-weight: 700;
      line-height: 1;
      margin-bottom: .3rem;
    }
    .score-card.err .score-val { color: var(--coral); }
    .score-card.pos .score-val { color: var(--sage); }
    .score-lbl {
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--ink-faint);
    }

    /* ─── SECTION CARDS ─── */
    .card {
      background: var(--paper);
      border-radius: 16px;
      border: 1px solid rgba(26,23,20,.06);
      overflow: hidden;
      animation: fadeUp .4s ease both;
    }
    .card:nth-child(2) { animation-delay: .07s; }
    .card:nth-child(3) { animation-delay: .13s; }
    .card:nth-child(4) { animation-delay: .19s; }
    .card:nth-child(5) { animation-delay: .25s; }

    .card-header {
      display: flex;
      align-items: center;
      gap: .6rem;
      padding: .9rem 1rem .75rem;
      border-bottom: 1px solid rgba(26,23,20,.06);
    }
    .card-icon {
      width: 32px; height: 32px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .95rem;
      flex-shrink: 0;
    }
    .card-icon.red   { background: rgba(232,85,62,.1); }
    .card-icon.green { background: rgba(61,140,106,.1); }
    .card-icon.amber { background: var(--amber-bg); }
    .card-title {
      font-weight: 700;
      font-size: .9rem;
      color: var(--ink);
    }
    .card-subtitle {
      font-size: .75rem;
      color: var(--ink-faint);
      margin-top: .1rem;
    }

    .card-body { padding: .85rem 1rem; }

    /* ─── RANKED LIST ─── */
    .ranked-list {
      display: flex;
      flex-direction: column;
      gap: .5rem;
    }
    .rank-row {
      display: flex;
      align-items: center;
      gap: .75rem;
    }
    .rank-num {
      width: 22px; height: 22px;
      border-radius: 50%;
      font-size: .7rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .rank-num.r1 { background: rgba(232,85,62,.15); color: var(--coral); }
    .rank-num.r2 { background: rgba(212,133,10,.12); color: var(--amber); }
    .rank-num.r3 { background: rgba(26,23,20,.07); color: var(--ink-soft); }

    .rank-body { flex: 1; }
    .rank-label {
      font-size: .85rem;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: .2rem;
    }
    .rank-bar-track {
      height: 4px;
      background: rgba(26,23,20,.07);
      border-radius: 2px;
      overflow: hidden;
    }
    .rank-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width .6s cubic-bezier(.4,0,.2,1);
    }
    .rank-bar-fill.err { background: var(--coral); }
    .rank-bar-fill.pos { background: var(--sage); }
    .rank-count {
      font-family: 'Lora', serif;
      font-size: 1rem;
      font-weight: 700;
      flex-shrink: 0;
      min-width: 1.6rem;
      text-align: right;
    }
    .rank-row .rank-count.err { color: var(--coral); }
    .rank-row .rank-count.pos { color: var(--sage); }

    /* ─── MISSING SKILLS ─── */
    .skill-chips {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
    }
    .skill-chip {
      display: flex;
      align-items: center;
      gap: .4rem;
      background: rgba(61,140,106,.07);
      border: 1.5px solid rgba(61,140,106,.15);
      color: var(--sage);
      border-radius: 100px;
      padding: .35rem .8rem;
      font-size: .8rem;
      font-weight: 600;
    }
    .skill-chip::before { content: '—'; opacity: .5; }

    .no-issues {
      font-size: .85rem;
      color: var(--ink-soft);
      font-style: italic;
    }

    /* ─── FOCUS CARD ─── */
    .focus-grid {
      display: flex;
      flex-direction: column;
      gap: .65rem;
    }
    .focus-item {
      display: flex;
      gap: .85rem;
      align-items: flex-start;
    }
    .focus-tag {
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: .3rem .65rem;
      border-radius: 100px;
      flex-shrink: 0;
      margin-top: .05rem;
    }
    .focus-tag.primary   { background: rgba(232,85,62,.12); color: var(--coral); }
    .focus-tag.secondary { background: rgba(212,133,10,.12); color: var(--amber); }
    .focus-text { font-size: .88rem; line-height: 1.5; color: var(--ink); }
    .focus-text strong { font-weight: 700; display: block; margin-bottom: .15rem; }
    .focus-tip { font-size: .8rem; color: var(--ink-soft); }

    /* ─── ACTIONS ─── */
    .actions {
      display: flex;
      gap: .65rem;
      animation: fadeUp .4s .3s ease both;
    }
    .action-btn {
      flex: 1;
      padding: .9rem;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-decoration: none;
      text-align: center;
      transition: background .2s, transform .12s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .4rem;
    }
    .action-btn.secondary { background: var(--paper); color: var(--ink); border: 1px solid rgba(26,23,20,.1); }
    .action-btn.primary   { background: var(--coral); color: #fff; }
    .action-btn.secondary:hover { background: #ede9e3; }
    .action-btn.primary:hover   { background: #d44232; }
    .action-btn:active { transform: scale(.97); }

    /* ─── EMPTY STATE ─── */
    .empty-state {
      text-align: center;
      padding: 3rem 1.5rem;
      animation: fadeUp .5s ease both;
    }
    .empty-state h2 {
      font-family: 'Lora', serif;
      font-size: 1.4rem;
      margin-bottom: .75rem;
    }
    .empty-state p {
      color: var(--ink-soft);
      font-size: .9rem;
      margin-bottom: 1.75rem;
      line-height: 1.6;
    }

    /* ─── ANIMATIONS ─── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<header>
  <a class="back-link" href="tracker.html">← Tracker</a>
  <span class="header-title">Lesson Summary</span>
  <a class="new-btn" href="tracker.html" onclick="startNew()">New Lesson</a>
</header>

<main id="main-content">
  <!-- JS renders content here -->
</main>

<script>
  const SESSION_KEY = 'lt_session';

  const LABELS = {
    errors:    {
      article:    'Wrong article',
      past_tense: 'Wrong past tense',
      hesitation: 'Hesitation',
      repetition: 'Repeating word'
    },
    positives: {
      modal:   'Modal verb',
      phrasal: 'Phrasal verb',
      idiom:   'Idiom'
    }
  };

  const FOCUS_TIPS = {
    article:    'Drill definite vs indefinite articles with short gap-fill exercises.',
    past_tense: 'Practise regular and irregular past simple in context sentences.',
    hesitation: 'Build fluency with timed speaking tasks and sentence starters.',
    repetition: 'Expand vocabulary with synonyms and collocations for common words.',
    modal:      'Introduce "could", "should", "would" — use them in real-life scenarios.',
    phrasal:    'Pick 3 high-frequency phrasal verbs and practise in short dialogues.',
    idiom:      'Choose one idiom per lesson and use it naturally in conversation.'
  };

  function startNew() {
    // Clear the session so tracker starts fresh
    localStorage.removeItem(SESSION_KEY);
  }

  function renderEmpty() {
    document.getElementById('main-content').innerHTML = `
      <div class="empty-state">
        <div style="font-size:3rem; margin-bottom:1rem;">📋</div>
        <h2>No lesson data yet</h2>
        <p>Complete a live lesson first and tap "End Lesson" to see your summary here.</p>
        <a class="action-btn primary" href="tracker.html" style="display:inline-flex;max-width:240px;margin:0 auto">
          Start Tracking →
        </a>
      </div>`;
  }

  function renderSummary(state) {
    const errEntries = Object.entries(state.errors)
      .filter(([,v]) => v > 0)
      .sort((a, b) => b[1] - a[1]);

    const posEntries = Object.entries(state.positives)
      .filter(([,v]) => v > 0)
      .sort((a, b) => b[1] - a[1]);

    const missingPos = Object.entries(state.positives)
      .filter(([,v]) => v === 0)
      .map(([k]) => k);

    const totalErr = Object.values(state.errors).reduce((a,b) => a+b, 0);
    const totalPos = Object.values(state.positives).reduce((a,b) => a+b, 0);
    const maxErr   = errEntries[0]?.[1] || 1;
    const maxPos   = posEntries[0]?.[1] || 1;

    // Suggested focus
    const primaryKey   = errEntries[0]?.[0] || null;
    const secondaryKey = missingPos[0] || posEntries[posEntries.length-1]?.[0] || null;

    // Format duration
    let durationStr = '';
    if (state.startedAt && state.endedAt) {
      const mins = Math.round((state.endedAt - state.startedAt) / 60000);
      durationStr = mins < 1 ? 'Less than a minute' : `${mins} min${mins > 1 ? 's' : ''}`;
    }

    const main = document.getElementById('main-content');

    // ── Score row ─────────────────────────────────────────────────
    const scoreRow = document.createElement('div');
    scoreRow.className = 'score-row';
    scoreRow.innerHTML = `
      <div class="score-card err">
        <div class="score-val">${totalErr}</div>
        <div class="score-lbl">Errors logged</div>
      </div>
      <div class="score-card pos">
        <div class="score-val">${totalPos}</div>
        <div class="score-lbl">Positives logged</div>
      </div>`;
    main.appendChild(scoreRow);

    // ── Top Issues ────────────────────────────────────────────────
    const topCard = document.createElement('div');
    topCard.className = 'card';

    if (errEntries.length === 0) {
      topCard.innerHTML = `
        <div class="card-header">
          <div class="card-icon red">⚠️</div>
          <div><div class="card-title">Top Issues Detected</div><div class="card-subtitle">Ranked by frequency</div></div>
        </div>
        <div class="card-body"><p class="no-issues">No errors logged this session — great lesson! 🎉</p></div>`;
    } else {
      const rows = errEntries.map(([key, count], i) => {
        const pct = Math.round((count / maxErr) * 100);
        const cls = i === 0 ? 'r1' : i === 1 ? 'r2' : 'r3';
        return `<div class="rank-row">
          <div class="rank-num ${cls}">${i+1}</div>
          <div class="rank-body">
            <div class="rank-label">${LABELS.errors[key]}</div>
            <div class="rank-bar-track"><div class="rank-bar-fill err" style="width:0%" data-pct="${pct}"></div></div>
          </div>
          <div class="rank-count err">${count}</div>
        </div>`;
      }).join('');

      topCard.innerHTML = `
        <div class="card-header">
          <div class="card-icon red">⚠️</div>
          <div><div class="card-title">Top Issues Detected</div><div class="card-subtitle">Ranked by frequency</div></div>
        </div>
        <div class="card-body"><div class="ranked-list">${rows}</div></div>`;
    }
    main.appendChild(topCard);

    // ── Positive Skills Used ──────────────────────────────────────
    if (posEntries.length > 0) {
      const posCard = document.createElement('div');
      posCard.className = 'card';
      const rows = posEntries.map(([key, count], i) => {
        const pct = Math.round((count / maxPos) * 100);
        const cls = i === 0 ? 'r1' : i === 1 ? 'r2' : 'r3';
        return `<div class="rank-row">
          <div class="rank-num ${cls}">${i+1}</div>
          <div class="rank-body">
            <div class="rank-label">${LABELS.positives[key]}</div>
            <div class="rank-bar-track"><div class="rank-bar-fill pos" style="width:0%" data-pct="${pct}"></div></div>
          </div>
          <div class="rank-count pos">${count}</div>
        </div>`;
      }).join('');
      posCard.innerHTML = `
        <div class="card-header">
          <div class="card-icon green">✨</div>
          <div><div class="card-title">Skills Used Well</div><div class="card-subtitle">Student strengths this session</div></div>
        </div>
        <div class="card-body"><div class="ranked-list">${rows}</div></div>`;
      main.appendChild(posCard);
    }

    // ── Missing Skills ────────────────────────────────────────────
    if (missingPos.length > 0) {
      const missingCard = document.createElement('div');
      missingCard.className = 'card';
      const chips = missingPos.map(k => `<div class="skill-chip">${LABELS.positives[k]}</div>`).join('');
      missingCard.innerHTML = `
        <div class="card-header">
          <div class="card-icon green">🔍</div>
          <div><div class="card-title">Missing or Low-Use Skills</div><div class="card-subtitle">Not used this lesson</div></div>
        </div>
        <div class="card-body"><div class="skill-chips">${chips}</div></div>`;
      main.appendChild(missingCard);
    }

    // ── Suggested Focus ───────────────────────────────────────────
    if (primaryKey || secondaryKey) {
      const focusCard = document.createElement('div');
      focusCard.className = 'card';

      let focusItems = '';
      if (primaryKey) {
        focusItems += `
          <div class="focus-item">
            <div class="focus-tag primary">Primary</div>
            <div class="focus-text">
              <strong>${LABELS.errors[primaryKey]}</strong>
              <span class="focus-tip">${FOCUS_TIPS[primaryKey]}</span>
            </div>
          </div>`;
      }
      if (secondaryKey) {
        const secLabel = LABELS.positives[secondaryKey] || LABELS.errors[secondaryKey];
        focusItems += `
          <div class="focus-item">
            <div class="focus-tag secondary">Secondary</div>
            <div class="focus-text">
              <strong>Introduce ${secLabel}</strong>
              <span class="focus-tip">${FOCUS_TIPS[secondaryKey]}</span>
            </div>
          </div>`;
      }

      focusCard.innerHTML = `
        <div class="card-header">
          <div class="card-icon amber">🎯</div>
          <div><div class="card-title">Suggested Focus — Next Lesson</div><div class="card-subtitle">Based on today's patterns</div></div>
        </div>
        <div class="card-body"><div class="focus-grid">${focusItems}</div></div>`;
      main.appendChild(focusCard);
    }

    // ── Duration (if available) ───────────────────────────────────
    if (durationStr) {
      const durDiv = document.createElement('div');
      durDiv.style.cssText = 'text-align:center;font-size:.78rem;color:var(--ink-faint);padding:.5rem 0 0;animation:fadeUp .4s .35s ease both;opacity:0;animation-fill-mode:both';
      durDiv.textContent = `Lesson duration: ${durationStr}`;
      main.appendChild(durDiv);
    }

    // ── Actions ───────────────────────────────────────────────────
    const acts = document.createElement('div');
    acts.className = 'actions';
    acts.innerHTML = `
      <a class="action-btn secondary" href="tracker.html">← Back to Tracker</a>
      <a class="action-btn primary" href="tracker.html" onclick="startNew()">New Lesson →</a>`;
    main.appendChild(acts);

    // Animate bars after paint
    requestAnimationFrame(() => {
      setTimeout(() => {
        document.querySelectorAll('.rank-bar-fill[data-pct]').forEach(el => {
          el.style.width = el.dataset.pct + '%';
        });
      }, 100);
    });
  }

  // ── Init ──────────────────────────────────────────────────────────
  (function init() {
    let state = null;
    try {
      const raw = localStorage.getItem(SESSION_KEY);
      if (raw) state = JSON.parse(raw);
    } catch(e) {}

    const hasData = state &&
      (Object.values(state.errors || {}).some(v => v > 0) ||
       Object.values(state.positives || {}).some(v => v > 0));

    if (!hasData) {
      renderEmpty();
    } else {
      renderSummary(state);
    }
  })();
</script>

</body>
</html>
