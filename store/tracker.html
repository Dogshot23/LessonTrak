<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Live Lesson Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:        #F7F4EF;
      --paper:        #FFFFFF;
      --ink:          #1A1714;
      --ink-soft:     #6B6560;
      --ink-faint:    #C5C0BA;
      --coral:        #E8553E;
      --coral-bg:     rgba(232,85,62,.08);
      --coral-border: rgba(232,85,62,.18);
      --sage:         #3D8C6A;
      --sage-bg:      rgba(61,140,106,.08);
      --sage-border:  rgba(61,140,106,.18);
      /* ── NEW: New Language accent ── */
      --slate:        #4A6FA5;
      --slate-bg:     rgba(74,111,165,.08);
      --slate-border: rgba(74,111,165,.18);
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
    }

    /* ─── LAYOUT ─── */
    .app {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      min-height: 100vh;
      max-width: 540px;
      margin: 0 auto;
      padding: env(safe-area-inset-top, 0px) 0 env(safe-area-inset-bottom, 0px);
    }

    /* ─── HEADER ─── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .9rem 1.25rem .7rem;
      border-bottom: 1px solid rgba(26,23,20,.07);
      background: var(--cream);
      flex-shrink: 0;
    }
    .header-left a {
      font-family: 'Lora', serif;
      font-weight: 700;
      font-size: .95rem;
      color: var(--ink);
      text-decoration: none;
      opacity: .6;
      transition: opacity .2s;
    }
    .header-left a:hover { opacity: 1; }
    .live-pill {
      display: flex;
      align-items: center;
      gap: .4rem;
      background: rgba(232,85,62,.1);
      color: var(--coral);
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .07em;
      text-transform: uppercase;
      padding: .3rem .75rem;
      border-radius: 100px;
    }
    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--coral);
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: .4; transform: scale(.85); }
    }
    .reset-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--ink-faint);
      font-size: .8rem;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      padding: .3rem .5rem;
      border-radius: 8px;
      transition: color .2s, background .2s;
    }
    .reset-btn:hover { color: var(--coral); background: rgba(232,85,62,.08); }

    /* ─── MAIN SCROLL ─── */
    main {
      flex: 1;
      -webkit-overflow-scrolling: touch;
      padding: .85rem 1rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: .85rem;
    }

    /* ─── SECTION BLOCKS ─── */
    .section-label {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: .55rem;
    }
    .section-label.err  { color: var(--coral); }
    .section-label.pos  { color: var(--sage); }
    .section-label.lang { color: var(--slate); }
    .section-label-line {
      flex: 1;
      height: 1px;
      background: currentColor;
      opacity: .2;
    }

    /* ─── BUTTON GRID ─── */
    .btn-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .55rem;
    }
    /* Last odd button spans full width */
    .btn-grid .track-btn:last-child:nth-child(odd) {
      grid-column: 1 / -1;
    }

    /* ─── TRACKER BUTTON ─── */
    .track-btn {
      position: relative;
      border: none;
      border-radius: 13px;
      padding: .8rem .8rem .7rem;
      cursor: pointer;
      text-align: left;
      font-family: 'DM Sans', sans-serif;
      transition: transform .1s, box-shadow .15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      display: flex;
      flex-direction: column;
      gap: .45rem;
      overflow: hidden;
    }
    .track-btn:active { transform: scale(.95); }

    .track-btn.err {
      background: var(--paper);
      border: 1.5px solid var(--coral-border);
    }
    .track-btn.pos {
      background: var(--paper);
      border: 1.5px solid var(--sage-border);
    }

    .track-btn.err:hover { background: rgba(232,85,62,.03); }
    .track-btn.pos:hover { background: rgba(61,140,106,.03); }

    /* Flash on tap */
    .track-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }
    .track-btn.err::after { background: rgba(232,85,62,.14); }
    .track-btn.pos::after { background: rgba(61,140,106,.14); }
    .track-btn.flash::after { opacity: 1; }

    .btn-label {
      font-size: .8rem;
      font-weight: 600;
      line-height: 1.25;
      color: var(--ink);
    }
    .btn-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .btn-count {
      font-size: 1.45rem;
      font-weight: 700;
      line-height: 1;
      font-family: 'Lora', serif;
      transition: transform .15s;
    }
    .track-btn.err .btn-count { color: var(--coral); }
    .track-btn.pos .btn-count { color: var(--sage); }

    .btn-count.bump { animation: bump .22s ease-out; }
    @keyframes bump {
      0%   { transform: scale(1); }
      45%  { transform: scale(1.38); }
      100% { transform: scale(1); }
    }

    .btn-icon {
      width: 24px; height: 24px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .82rem;
      flex-shrink: 0;
    }
    .track-btn.err .btn-icon { background: var(--coral-bg); }
    .track-btn.pos .btn-icon { background: var(--sage-bg); }

    /* ─── TOTALS BAR ─── */
    .totals-bar {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      background: var(--paper);
      border-radius: 13px;
      padding: .75rem 1rem;
      border: 1px solid rgba(26,23,20,.06);
      gap: .5rem;
      flex-shrink: 0;
    }
    .total-item { text-align: center; }
    .total-val {
      font-family: 'Lora', serif;
      font-size: 1.45rem;
      font-weight: 700;
      line-height: 1;
    }
    .total-item:first-child .total-val { color: var(--coral); }
    .total-item:last-child  .total-val { color: var(--sage); }
    .total-lbl {
      font-size: .62rem;
      font-weight: 600;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-top: .2rem;
    }
    .total-divider { width: 1px; height: 28px; background: rgba(26,23,20,.08); margin: 0 auto; }

    /* ─── END LESSON BUTTON ─── */
    .end-section {
      padding: .6rem 1rem calc(.8rem + env(safe-area-inset-bottom, 0px));
      flex-shrink: 0;
      border-top: 1px solid rgba(26,23,20,.07);
      background: var(--cream);
    }
    .end-btn {
      width: 100%;
      padding: 1rem;
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: 13px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s, transform .12s;
      -webkit-tap-highlight-color: transparent;
      letter-spacing: -.01em;
    }
    .end-btn:hover   { background: #2e2a26; }
    .end-btn:active  { transform: scale(.98); }

    /* ─── CONFIRM OVERLAY ─── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(26,23,20,.5);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: flex-end;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }
    .overlay.show { opacity: 1; pointer-events: all; }
    .sheet {
      background: var(--paper);
      width: 100%;
      max-width: 540px;
      margin: 0 auto;
      border-radius: 20px 20px 0 0;
      padding: 1.5rem 1.25rem calc(1.5rem + env(safe-area-inset-bottom, 0px));
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.22,1,.36,1);
    }
    .overlay.show .sheet { transform: translateY(0); }

    .sheet-handle {
      width: 36px; height: 4px;
      background: var(--ink-faint);
      border-radius: 2px;
      margin: 0 auto 1.5rem;
    }
    .sheet h3 {
      font-family: 'Lora', serif;
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: .4rem;
    }
    .sheet p { font-size: .88rem; color: var(--ink-soft); margin-bottom: 1.5rem; }
    .sheet-actions { display: flex; gap: .65rem; }
    .sheet-cancel, .sheet-confirm {
      flex: 1;
      padding: .9rem;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background .2s, transform .12s;
    }
    .sheet-cancel  { background: var(--cream); color: var(--ink); }
    .sheet-confirm { background: var(--coral); color: #fff; }
    .sheet-cancel:hover  { background: #ede9e3; }
    .sheet-confirm:hover { background: #d44232; }
    .sheet-confirm:active, .sheet-cancel:active { transform: scale(.97); }

    /* ─── NEW LANGUAGE SECTION ─── */
    .lang-input-row {
      display: flex;
      gap: .45rem;
      margin-bottom: .45rem;
    }
    .lang-input {
      flex: 1;
      border: 1.5px solid rgba(26,23,20,.12);
      border-radius: 10px;
      padding: .58rem .8rem;
      font-family: 'DM Sans', sans-serif;
      font-size: .88rem;
      background: var(--paper);
      color: var(--ink);
      outline: none;
      transition: border-color .2s;
      min-width: 0;
    }
    .lang-input::placeholder { color: var(--ink-faint); }
    .lang-input:focus { border-color: var(--slate); }
    .lang-add-btn {
      flex-shrink: 0;
      width: 36px; height: 36px;
      border: none;
      border-radius: 10px;
      background: var(--ink);
      color: #fff;
      font-size: 1.3rem;
      font-weight: 400;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .lang-add-btn:hover  { background: #2e2a26; }
    .lang-add-btn:active { transform: scale(.9); }

    .lang-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: .3rem;
    }
    .lang-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--paper);
      border: 1px solid var(--slate-border);
      border-radius: 9px;
      padding: .42rem .55rem .42rem .75rem;
      font-size: .86rem;
      color: var(--ink);
      animation: fadeIn .18s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .lang-item-text {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .lang-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--ink-faint);
      font-size: 1rem;
      line-height: 1;
      padding: .1rem .2rem .1rem .55rem;
      flex-shrink: 0;
      transition: color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .lang-remove:hover { color: var(--coral); }
  </style>
</head>
<body>

<div class="app">

  <header>
    <div class="header-left">
      <a href="index.html">← LessonTracker</a>
    </div>
    <div class="live-pill"><span class="live-dot"></span> Live</div>
    <button class="reset-btn" onclick="confirmReset()">Reset</button>
  </header>

  <main id="main-scroll">

    <!-- TOTALS -->
    <div class="totals-bar">
      <div class="total-item">
        <div class="total-val" id="total-errors">0</div>
        <div class="total-lbl">Errors</div>
      </div>
      <div class="total-divider"></div>
      <div class="total-item">
        <div class="total-val" id="total-positives">0</div>
        <div class="total-lbl">Positives</div>
      </div>
    </div>

    <!-- ERRORS -->
    <div>
      <div class="section-label err">
        Errors
        <div class="section-label-line"></div>
      </div>
      <div class="btn-grid">
        <button class="track-btn err" onclick="tap('errors','articles',this)">
          <div class="btn-label">Articles</div>
          <div class="btn-bottom">
            <div class="btn-count" id="c-articles">0</div>
            <div class="btn-icon">📝</div>
          </div>
        </button>
        <button class="track-btn err" onclick="tap('errors','tense',this)">
          <div class="btn-label">Tense</div>
          <div class="btn-bottom">
            <div class="btn-count" id="c-tense">0</div>
            <div class="btn-icon">⏱️</div>
          </div>
        </button>
        <button class="track-btn err" onclick="tap('errors','word_order',this)">
          <div class="btn-label">Word Order</div>
          <div class="btn-bottom">
            <div class="btn-count" id="c-word_order">0</div>
            <div class="btn-icon">🔀</div>
          </div>
        </button>
        <button class="track-btn err" onclick="tap('errors','vocabulary',this)">
          <div class="btn-label">Vocabulary</div>
          <div class="btn-bottom">
            <div class="btn-count" id="c-vocabulary">0</div>
            <div class="btn-icon">📚</div>
          </div>
        </button>
        <button class="track-btn err" onclick="tap('errors','pronunciation',this)">
          <div class="btn-label">Pronunciation</div>
          <div class="btn-bottom">
            <div class="btn-count" id="c-pronunciation">0</div>
            <div class="btn-icon">🗣️</div>
          </div>
        </button>
        <button class="track-btn err" onclick="tap('errors','fluency',this)">
          <div class="btn-label">Fluency</div>
          <div class="btn-bottom">
            <div class="btn-count" id="c-fluency">0</div>
            <div class="btn-icon">💬</div>
          </div>
        </button>
      </div>
    </div>

    <!-- POSITIVES -->
    <div>
      <div class="section-label pos">
        Positives
        <div class="section-label-line"></div>
      </div>
      <div class="btn-grid">
        <button class="track-btn pos" onclick="tap('positives','good_grammar',this)">
          <div class="btn-label">Good Grammar</div>
          <div class="btn-bottom">
            <div class="btn-count" id="c-good_grammar">0</div>
            <div class="btn-icon">✅</div>
          </div>
        </button>
        <button class="track-btn pos" onclick="tap('positives','good_vocab',this)">
          <div class="btn-label">Good Vocabulary</div>
          <div class="btn-bottom">
            <div class="btn-count" id="c-good_vocab">0</div>
            <div class="btn-icon">🌟</div>
          </div>
        </button>
        <button class="track-btn pos" onclick="tap('positives','complex_structure',this)">
          <div class="btn-label">Complex Structure</div>
          <div class="btn-bottom">
            <div class="btn-count" id="c-complex_structure">0</div>
            <div class="btn-icon">🏗️</div>
          </div>
        </button>
        <button class="track-btn pos" onclick="tap('positives','connector',this)">
          <div class="btn-label">Connector Used</div>
          <div class="btn-bottom">
            <div class="btn-count" id="c-connector">0</div>
            <div class="btn-icon">🔗</div>
          </div>
        </button>
        <button class="track-btn pos" onclick="tap('positives','natural_phrase',this)">
          <div class="btn-label">Natural Phrase</div>
          <div class="btn-bottom">
            <div class="btn-count" id="c-natural_phrase">0</div>
            <div class="btn-icon">💎</div>
          </div>
        </button>
      </div>
    </div>

    <!-- NEW LANGUAGE -->
    <div>
      <div class="section-label lang">
        New Language
        <div class="section-label-line"></div>
      </div>
      <div class="lang-input-row">
        <input
          type="text"
          id="lang-input"
          class="lang-input"
          placeholder="Add word or phrase…"
          maxlength="80"
          onkeydown="if(event.key==='Enter') addLanguage()"
        />
        <button class="lang-add-btn" onclick="addLanguage()" aria-label="Add">+</button>
      </div>
      <ul class="lang-list" id="lang-list"></ul>
    </div>

  </main>

  <!-- END LESSON -->
  <div class="end-section">
    <button class="end-btn" onclick="showEndSheet()">End Lesson →</button>
  </div>

</div>

<!-- BOTTOM SHEET: End Lesson -->
<div class="overlay" id="end-overlay" onclick="closeSheet(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3>End this lesson?</h3>
    <p>Your session data will be saved and you'll see the full summary.</p>
    <div class="sheet-actions">
      <button class="sheet-cancel" onclick="hideEndSheet()">Cancel</button>
      <button class="sheet-confirm" onclick="endLesson()">See Summary →</button>
    </div>
  </div>
</div>

<!-- BOTTOM SHEET: Reset -->
<div class="overlay" id="reset-overlay" onclick="closeResetSheet(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3>Reset all counts?</h3>
    <p>This will clear all taps for the current session.</p>
    <div class="sheet-actions">
      <button class="sheet-cancel" onclick="hideResetSheet()">Cancel</button>
      <button class="sheet-confirm" style="background:#d44232" onclick="doReset()">Reset</button>
    </div>
  </div>
</div>

<script>
  const SESSION_KEY = 'lt_session';

  const LABELS = {
    errors: {
      articles:      'Articles',
      tense:         'Tense',
      word_order:    'Word Order',
      vocabulary:    'Vocabulary',
      pronunciation: 'Pronunciation',
      fluency:       'Fluency'
    },
    positives: {
      good_grammar:      'Good Grammar',
      good_vocab:        'Good Vocabulary',
      complex_structure: 'Complex Structure',
      connector:         'Connector Used',
      natural_phrase:    'Natural Phrase'
    }
  };

  // ── State ──────────────────────────────────────────────────────────
  let state = {
    errors: {
      articles: 0, tense: 0, word_order: 0,
      vocabulary: 0, pronunciation: 0, fluency: 0
    },
    positives: {
      good_grammar: 0, good_vocab: 0, complex_structure: 0,
      connector: 0, natural_phrase: 0
    },
    newLanguage: [],   // ← NEW
    startedAt: null
  };

  function loadState() {
    try {
      const saved = localStorage.getItem(SESSION_KEY);
      if (saved) {
        const parsed = JSON.parse(saved);
        // Only restore if < 6 hours old
        if (parsed.startedAt && Date.now() - parsed.startedAt < 6 * 3600 * 1000) {
          state.startedAt = parsed.startedAt;
          for (const k of Object.keys(state.errors)) {
            if (parsed.errors && parsed.errors[k] !== undefined) state.errors[k] = parsed.errors[k];
          }
          for (const k of Object.keys(state.positives)) {
            if (parsed.positives && parsed.positives[k] !== undefined) state.positives[k] = parsed.positives[k];
          }
          // ── NEW: restore language list ──
          if (Array.isArray(parsed.newLanguage)) state.newLanguage = parsed.newLanguage;
        } else {
          state.startedAt = Date.now();
          saveState();
        }
      } else {
        state.startedAt = Date.now();
        saveState();
      }
    } catch(e) {
      state.startedAt = Date.now();
    }
    renderAll();
  }

  function saveState() {
    localStorage.setItem(SESSION_KEY, JSON.stringify(state));
  }

  // ── Render ─────────────────────────────────────────────────────────
  function renderAll() {
    let errTotal = 0, posTotal = 0;
    for (const [key, val] of Object.entries(state.errors)) {
      const el = document.getElementById('c-' + key);
      if (el) el.textContent = val;
      errTotal += val;
    }
    for (const [key, val] of Object.entries(state.positives)) {
      const el = document.getElementById('c-' + key);
      if (el) el.textContent = val;
      posTotal += val;
    }
    document.getElementById('total-errors').textContent    = errTotal;
    document.getElementById('total-positives').textContent = posTotal;
    renderLanguage();   // ← NEW
  }

  // ── Tap handler ────────────────────────────────────────────────────
  function tap(group, key, btn) {
    state[group][key]++;
    saveState();

    const countEl = document.getElementById('c-' + key);
    if (countEl) {
      countEl.textContent = state[group][key];
      countEl.classList.remove('bump');
      void countEl.offsetWidth;
      countEl.classList.add('bump');
    }

    btn.classList.add('flash');
    setTimeout(() => btn.classList.remove('flash'), 280);

    let errTotal = 0, posTotal = 0;
    for (const v of Object.values(state.errors))    errTotal += v;
    for (const v of Object.values(state.positives)) posTotal += v;
    document.getElementById('total-errors').textContent    = errTotal;
    document.getElementById('total-positives').textContent = posTotal;
  }

  // ── New Language ───────────────────────────────────────────────────
  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function addLanguage() {
    const input = document.getElementById('lang-input');
    const val = input.value.trim();
    if (!val) return;
    state.newLanguage.push(val);
    saveState();
    input.value = '';
    input.focus();
    renderLanguage();
  }

  function removeLanguage(i) {
    state.newLanguage.splice(i, 1);
    saveState();
    renderLanguage();
  }

  function renderLanguage() {
    const list = document.getElementById('lang-list');
    if (!list) return;
    list.innerHTML = '';
    state.newLanguage.forEach((item, i) => {
      const li = document.createElement('li');
      li.className = 'lang-item';
      li.innerHTML =
        `<span class="lang-item-text">${escapeHtml(item)}</span>` +
        `<button class="lang-remove" onclick="removeLanguage(${i})" aria-label="Remove">×</button>`;
      list.appendChild(li);
    });
  }

  // ── End lesson sheet ──────────────────────────────────────────────
  function showEndSheet() {
    document.getElementById('end-overlay').classList.add('show');
  }
  function hideEndSheet() {
    document.getElementById('end-overlay').classList.remove('show');
  }
  function closeSheet(e) {
    if (e.target === document.getElementById('end-overlay')) hideEndSheet();
  }
  function endLesson() {
    state.endedAt = Date.now();
    localStorage.setItem(SESSION_KEY, JSON.stringify(state));
    window.location.href = 'summary.html';
  }

  // ── Reset sheet ───────────────────────────────────────────────────
  function confirmReset() {
    document.getElementById('reset-overlay').classList.add('show');
  }
  function hideResetSheet() {
    document.getElementById('reset-overlay').classList.remove('show');
  }
  function closeResetSheet(e) {
    if (e.target === document.getElementById('reset-overlay')) hideResetSheet();
  }
  function doReset() {
    state = {
      errors: {
        articles: 0, tense: 0, word_order: 0,
        vocabulary: 0, pronunciation: 0, fluency: 0
      },
      positives: {
        good_grammar: 0, good_vocab: 0, complex_structure: 0,
        connector: 0, natural_phrase: 0
      },
      newLanguage: [],   // ← NEW
      startedAt: Date.now()
    };
    saveState();
    renderAll();
    hideResetSheet();
  }

  // ── Init ──────────────────────────────────────────────────────────
  loadState();
</script>

</body>
</html>
